name: Release
on:
  push:
    tags: ["v*"]

jobs:
  linux-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:41
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y git curl gcc gcc-c++ make perl which \
            libwebkit2gtk4.1-devel libappindicator-gtk3-devel \
            librsvg2-devel patchelf gtk3-devel libsoup3-devel \
            javascriptcoregtk4.1-devel openssl-devel libxdo-devel \
            file

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdesq-linux
          path: src-tauri/target/release/bundle/

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdesq-windows
          path: src-tauri/target/release/bundle/

  create-release:
    needs: [linux-fedora, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rdesq-linux/**/*.AppImage
            rdesq-linux/**/*.rpm
            rdesq-windows/**/*.msi
            rdesq-windows/**/*.exe
          generate_release_notes: true
