name: Release
on:
  push:
    tags: ["v*"]

jobs:
  linux-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libssl-dev libxdo-dev file build-essential jq xvfb

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: npm ci

      - name: Build .deb
        run: npx tauri build --bundles deb

      - name: Build AppImage (sharun)
        run: bash scripts/build-appimage-sharun.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdesq-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  linux-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:41
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y git curl gcc gcc-c++ make perl which \
            webkit2gtk4.1-devel libappindicator-gtk3-devel \
            librsvg2-devel patchelf gtk3-devel libsoup3-devel \
            javascriptcoregtk4.1-devel openssl-devel libxdo-devel \
            file jq

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install frontend dependencies
        run: npm ci

      - name: Build .rpm
        run: npx tauri build --bundles rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdesq-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdesq-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    needs: [linux-ubuntu, linux-rpm, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rdesq-linux/**/*.deb
            rdesq-linux/**/*.AppImage
            rdesq-linux-rpm/**/*.rpm
            rdesq-windows/**/*.msi
            rdesq-windows/**/*.exe
          generate_release_notes: true
